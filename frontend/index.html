<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stay Hydrated - Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page auth-page">
    <div class="card auth-card">
      <h1>Stay Hydrated</h1>
      <p class="subtitle">24-Hour Water Flow Optimization System</p>

      <div class="tabs">
        <button id="showLoginBtn" class="tab-btn active">Login</button>
        <button id="showRegisterBtn" class="tab-btn">Register</button>
      </div>

      <div id="messageBox" class="message hidden"></div>

      <form id="loginForm" class="form">
        <h2>Login</h2>
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username" required />

        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required />

        <button type="submit" class="primary-btn">Login</button>
      </form>

      <form id="registerForm" class="form hidden">
        <h2>Register</h2>
        <label>Username</label>
        <input type="text" id="registerUsername" placeholder="Choose username" required />

        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Enter email" required />

        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="Choose password" required />

        <button type="submit" class="primary-btn">Register</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
